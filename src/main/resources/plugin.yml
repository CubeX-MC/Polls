name: Polls
version: '${project.version}'
main: com.polls.PollsPlugin
api-version: '1.21'
# Paper API is detected at runtime / Paper API 在运行时自动检测
folia-supported: true
description: Community polling plugin / 玩家民意收集插件
authors: [CubeXMC]

commands:
  polls:
    description: Open the poll menu / 打开投票主界面
    usage: /polls

permissions:
  polls.submit:
    description: Submit poll proposals / 提交投票议题
    default: true
  polls.vote:
    description: Vote in polls / 参与投票
    default: true
  polls.admin:
    description: Manage poll content, deadlines, and deletion / 管理议题内容、截止时间和删除操作
    default: op
