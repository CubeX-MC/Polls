# Polls 配置

# 投票数据保留天数（到期自动删除，最小为 1）
data-retention-days: 30

# 管理员权限节点（持有此权限可管理议题）
admin-permission: polls.admin

# 每个议题最多可添加的选项数（有效范围 2-9）
max-options: 9

# 提交议题时标题最大字符数
max-title-length: 40

# 选项名称最大字符数
max-option-label-length: 40

# 提交议题时描述最大字符数
max-description-length: 200

# 每个选项描述最大字符数
max-option-desc-length: 100
