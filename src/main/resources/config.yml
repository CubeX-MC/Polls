# Polls 配置

# Language / 界面语言: zh_CN (简体中文) or en_US (English)
language: zh_CN

# Poll creation templates / 议题创建模板
# Set enabled to false to keep the original creation flow without a template menu.
# enabled 设为 false 时跳过模板菜单并直接创建普通投票。
submit-templates:
  enabled: true
  # Available templates: normal, rental, loan / 可用模板：normal、rental、loan
  available:
    - normal
    - rental
    - loan
  # Prefill localized approve/reject choices for rental and loan templates.
  # 是否为出租和贷款模板预填本地化的同意/拒绝选项。
  prefill-options: true

# 投票数据保留天数（到期自动删除，最小为 1）
data-retention-days: 30

# 管理员权限节点（持有此权限可管理议题）
admin-permission: polls.admin

# 每个议题最多可添加的选项数（有效范围 2-9）
max-options: 9

# 提交议题时标题最大字符数
max-title-length: 40

# 选项名称最大字符数
max-option-label-length: 40

# 提交议题时描述最大字符数
max-description-length: 200

# 每个选项描述最大字符数
max-option-desc-length: 100
